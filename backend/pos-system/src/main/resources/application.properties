spring.application.name=pharmaflow-backend
server.port=${SERVER_PORT:${PORT:8080}}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pharmaflow}
spring.datasource.username=${DATABASE_USERNAME:pharmaflow_user}
spring.datasource.password=${DATABASE_PASSWORD:PharmaFlow@2024}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.url=${REDIS_URL:}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}

spring.security.user.name=pharmaflow
spring.security.user.password=pharmaflow

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-origin-patterns=
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Cache-Control,Content-Type,X-Store-ID,X-Tenant-ID,X-Tenant-Slug,X-Brand-Name,X-Brand-Tagline,X-Brand-Support-Email,X-Brand-Support-Phone
cors.allow-credentials=true
cors.max-age=3600

jwt.secret=PharmaFlowSuperSecretKey2024IndiaPharmacySaaS
jwt.expiration=86400000

management.health.mail.enabled=false
management.health.redis.enabled=true
management.metrics.export.prometheus.enabled=true

aws.access.key=
aws.secret.key=
aws.s3.bucket=
aws.region=ap-south-1

pharmaflow.gst.state-code=33
pharmaflow.gst.state-name=Tamil Nadu
pharmaflow.invoice.prefix=TN
pharmaflow.brand.name=${PHARMAFLOW_BRAND_NAME:PharmaFlow}
pharmaflow.brand.tagline=${PHARMAFLOW_BRAND_TAGLINE:Retail pharmacy operations, billing, and compliance workspace}
pharmaflow.brand.support-email=${PHARMAFLOW_BRAND_SUPPORT_EMAIL:support@pharmaflow.in}
pharmaflow.brand.support-phone=${PHARMAFLOW_BRAND_SUPPORT_PHONE:+91 44 4000 9000}
pharmaflow.upload.prescription-path=./uploads/prescriptions/
pharmaflow.default-admin.username=admin
pharmaflow.default-admin.password=Admin@123
pharmaflow.default-admin.full-name=PharmaFlow Administrator
pharmaflow.default-admin.store-code=TN-HO-000
