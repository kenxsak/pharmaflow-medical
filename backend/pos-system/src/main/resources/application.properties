spring.application.name=pharmaflow-backend
server.port=${SERVER_PORT:${PORT:8080}}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pharmaflow}
spring.datasource.username=${DATABASE_USERNAME:pharmaflow_user}
spring.datasource.password=${DATABASE_PASSWORD:PharmaFlow@2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:4}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.validation-timeout=${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.keepalive-time=${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:0}
spring.datasource.hikari.leak-detection-threshold=${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:0}
spring.datasource.hikari.pool-name=${SPRING_DATASOURCE_HIKARI_POOL_NAME:pharmaflow-main}
spring.datasource.hikari.data-source-properties.ApplicationName=${SPRING_DATASOURCE_APPLICATION_NAME:pharmaflow-backend}
spring.datasource.hikari.data-source-properties.connectTimeout=${SPRING_DATASOURCE_CONNECT_TIMEOUT:10}
spring.datasource.hikari.data-source-properties.socketTimeout=${SPRING_DATASOURCE_SOCKET_TIMEOUT:30}
spring.datasource.hikari.data-source-properties.tcpKeepAlive=${SPRING_DATASOURCE_TCP_KEEP_ALIVE:true}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.url=${REDIS_URL:}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.ssl=${REDIS_SSL:false}
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.security.user.name=pharmaflow
spring.security.user.password=pharmaflow

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-origin-patterns=
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Cache-Control,Content-Type,X-Store-ID,X-Tenant-ID,X-Tenant-Slug,X-Brand-Name,X-Brand-Tagline,X-Brand-Support-Email,X-Brand-Support-Phone
cors.allow-credentials=true
cors.max-age=3600

jwt.secret=PharmaFlowSuperSecretKey2024IndiaPharmacySaaS
jwt.expiration=86400000

logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:${SECURITY_DEBUG:INFO}}

management.health.mail.enabled=false
management.metrics.export.prometheus.enabled=true
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
management.endpoint.health.show-components=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_COMPONENTS:when_authorized}
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=${MANAGEMENT_HEALTH_READINESS_INCLUDE:readinessState,db}
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.redis.enabled=${REDIS_HEALTH:${PHARMAFLOW_REDIS_ENABLED:false}}

aws.access.key=
aws.secret.key=
aws.s3.bucket=
aws.region=ap-south-1

pharmaflow.gst.state-code=33
pharmaflow.gst.state-name=Tamil Nadu
pharmaflow.invoice.prefix=TN
pharmaflow.brand.name=${PHARMAFLOW_BRAND_NAME:PharmaFlow}
pharmaflow.brand.tagline=${PHARMAFLOW_BRAND_TAGLINE:Retail pharmacy operations, billing, and compliance workspace}
pharmaflow.brand.support-email=${PHARMAFLOW_BRAND_SUPPORT_EMAIL:support@pharmaflow.in}
pharmaflow.brand.support-phone=${PHARMAFLOW_BRAND_SUPPORT_PHONE:+91 44 4000 9000}
pharmaflow.storage.provider=${PHARMAFLOW_STORAGE_PROVIDER:auto}
pharmaflow.storage.local-root=${PHARMAFLOW_STORAGE_LOCAL_ROOT:./data/documents}
pharmaflow.storage.max-file-size-bytes=${PHARMAFLOW_STORAGE_MAX_FILE_SIZE_BYTES:10485760}
pharmaflow.storage.allowed-content-types=${PHARMAFLOW_STORAGE_ALLOWED_CONTENT_TYPES:application/pdf,image/jpeg,image/png,image/webp}
pharmaflow.observability.slow-request-threshold-ms=${PHARMAFLOW_SLOW_REQUEST_THRESHOLD_MS:1500}
pharmaflow.redis.enabled=${PHARMAFLOW_REDIS_ENABLED:false}
pharmaflow.default-admin.username=admin
pharmaflow.default-admin.password=Admin@123
pharmaflow.default-admin.full-name=PharmaFlow Administrator
pharmaflow.default-admin.store-code=TN-HO-000
