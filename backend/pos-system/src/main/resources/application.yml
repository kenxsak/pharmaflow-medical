spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: MAIN-POS-BACKEND
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:4}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:0}
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:60000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:0}
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    jdbc:
      lob:
        non_contextual_creation: true
    show-sql: ${JDBC_SHOW_SQL}
    open-in-view: ${HIBERNATE_OPEN_IN_VIEW:false}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    locations: classpath:db/migration
    clean-disabled: true
  security:
    user:
      name: ${SPRING_SECURITY_USERNAME}
      password: ${SPRING_SECURITY_PASSWORD}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_USER_NAME}
    password: ${SPRING_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# OpenSearch Configuration
opensearch:
  enabled: ${OPENSEARCH_ENABLED:false}
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:9200}
  scheme: ${OPENSEARCH_SCHEME:http}
  username: ${OPENSEARCH_USERNAME:admin}
  password: ${OPENSEARCH_PASSWORD:admin}

server:
  port: ${SERVER_PORT:${PORT:8080}}

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:${SECURITY_DEBUG:INFO}}

aws:
  access.key: ${AWS_ACCESS_KEY}
  secret.key: ${AWS_SECRET_KEY}
  s3.bucket: ${AWS_S3_BUCKET}
  region: ${AWS_REGION}

pharmaflow:
  storage:
    provider: ${PHARMAFLOW_STORAGE_PROVIDER:auto}
    local-root: ${PHARMAFLOW_STORAGE_LOCAL_ROOT:./data/documents}
    max-file-size-bytes: ${PHARMAFLOW_STORAGE_MAX_FILE_SIZE_BYTES:10485760}
    allowed-content-types: ${PHARMAFLOW_STORAGE_ALLOWED_CONTENT_TYPES:application/pdf,image/jpeg,image/png,image/webp}

# CORS Configuration - All settings loaded from environment variables
# See CorsFilter.java in filter package for implementation
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Cache-Control,Content-Type,X-Store-ID,X-Tenant-ID,X-Tenant-Slug,X-Brand-Name,X-Brand-Tagline,X-Brand-Support-Email,X-Brand-Support-Phone}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
      show-components: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_COMPONENTS:when_authorized}
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db,redis
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: ${MAIL_HEALTH}
    redis:
      enabled: ${REDIS_HEALTH}
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_METRICS_EXPORT}

