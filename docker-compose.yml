services:
  postgres:
    image: postgres:15
    container_name: pharmaflow-db
    environment:
      POSTGRES_DB: pharmaflow
      POSTGRES_USER: pharmaflow_user
      POSTGRES_PASSWORD: PharmaFlow@2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pharmaflow-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend/pos-system
    container_name: pharmaflow-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/pharmaflow
      DATABASE_USERNAME: pharmaflow_user
      DATABASE_PASSWORD: PharmaFlow@2024
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      JWT_SECRET: PharmaFlowSuperSecretKey2024IndiaPharmacySaaS
      HIBERNATE_DDL_AUTO: validate
      SECURITY_LOG_LEVEL: INFO
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      CORS_ALLOWED_HEADERS: Authorization,Cache-Control,Content-Type,X-Store-ID,X-Tenant-ID,X-Tenant-Slug,X-Brand-Name,X-Brand-Tagline,X-Brand-Support-Email,X-Brand-Support-Phone
      PHARMAFLOW_BRAND_NAME: PharmaFlow
      PHARMAFLOW_BRAND_TAGLINE: Retail pharmacy operations, billing, and compliance workspace
      PHARMAFLOW_BRAND_SUPPORT_EMAIL: support@pharmaflow.in
      PHARMAFLOW_BRAND_SUPPORT_PHONE: +91 44 4000 9000
      PHARMAFLOW_STORAGE_PROVIDER: local
      PHARMAFLOW_STORAGE_LOCAL_ROOT: /app/data/documents
      PHARMAFLOW_MEDICINE_AUTO_IMPORT: "true"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pharmaflow-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api/v1
      REACT_APP_LEGACY_API_URL: http://localhost:8080/lifepill/v1
      REACT_APP_STORE_NAME: PharmaFlow
      REACT_APP_BRAND_NAME: PharmaFlow
      REACT_APP_BRAND_TAGLINE: Retail pharmacy operations, billing, and compliance workspace
      REACT_APP_BRAND_SUPPORT_EMAIL: support@pharmaflow.in
      REACT_APP_BRAND_SUPPORT_PHONE: +91 44 4000 9000
      REACT_APP_BRAND_DEPLOYMENT_MODE: Hybrid cloud + branch-local operations
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
